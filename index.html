<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柳铁一中（初中部）2418班</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/img-card.css">
</head>
<body>
    <div w3-include-html="/header.html"></div>
    <div w3-include-html="/wallpaper.html"></div>

    <main>
        <section class="intro-section">
            <h1 class="intro-title">2418班</h1>
            <p class="intro-subtitle">柳州铁一中学（初中部）</p>
        </section>

        <!-- 背景挡板 -->
        <div class="background-panel">
            <!-- 并排容器：班主任介绍和班级介绍在同一行 -->
            <div class="intro-row">
                <!-- 班主任介绍块（左侧，添加 teacher-block 类） -->
                <div class="class-intro-block teacher-block">
                    <div class="intro-text">
                        <h3>班主任介绍</h3>
                        <p>
                            班主任：刘茜  |  英语教师<br>
                        </p>
                    </div>
                    <div class="intro-image">
                        <img src="/img/user.png">
                    </div>
                </div>

                <!-- 班级介绍块（右侧） -->
                <div class="class-intro-block">
                    <div class="intro-text">
                        <h3>班级介绍</h3>
                        <p>
                            2418班共有55名学生，其中女生24人，男生31人。班级学生性格活波开朗。
                        </p>
                    </div>
                    <div class="intro-image">
                        <img src="/img/测试合照.png" alt="班级合影" onerror="this.src='/img/班徽.jpg';">
                    </div>
                </div>
            </div>
        </div>

        <div class="filing-text">
            <p>* 使用 ChatGPT、DeepSeek、Copilot 生成</p>
        </div>
    </main>

    <script src="/include.js"></script>
</body>
</html>
