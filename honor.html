<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柳铁一中（初中部）2418班</title>
    <link rel="stylesheet" href="/style.css">
    <div w3-include-html="/wallpaper.html"></div>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* 核心：设置页面弹性布局，让页脚固定底部 */
        html, body {
            height: 100%; /* 必须设置高度100% */
            min-height: 100vh; /* 兼容移动端 */
        }
        body {
            background-image: url('https://picui.ogmua.cn/s1/2026/03/12/69b24ea329e74.webp');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(5px);
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: overlay;
            color: #333;
            line-height: 1.6;
            padding-top: 60px; /* 避开固定导航栏 */
            
            /* 关键：弹性布局 */
            display: flex;
            flex-direction: column; /* 垂直排列 */
        }

        /* 核心：内容区自动填充剩余空间 */
        .page-content {
            flex: 1; /* 占满除了头部和页脚的所有空间 */
        }

        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* 分类标签样式 */
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.8);
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease; /* 标签切换动效 */
            font-size: 0.9rem;
        }
        .tab-btn.active {
            background: rgb(99,99,99);
            color: white;
            transform: translateY(-2px); /* 激活标签上移动效 */
        }
        .tab-btn:hover {
            background: rgba(99,99,99,0.8);
            color: white;
        }

        /* 荣誉卡片网格 */
        .honor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* 荣誉卡片样式 + 动态hover效果 */
        .honor-card {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease; /* 卡片整体动效 */
            cursor: pointer;
        }
        .honor-card:hover {
            transform: translateY(-8px); /* 鼠标悬浮上移 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* 悬浮加深阴影 */
        }
        .honor-badge {
            background: rgb(99,99,99);
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .card-img img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease; /* 图片缩放动效 */
        }
        .honor-card:hover .card-img img {
            transform: scale(1.05); /* 悬浮时图片轻微放大 */
        }
        .card-content {
            padding: 15px;
        }
        .card-title {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        /* header 样式（导航栏） */
        .site-header {
          position: fixed;
          top: 0; left: 0; right: 0;
          z-index: 100;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 8px 14px;
          background: rgb(255,255,255);
          backdrop-filter: blur(12px) saturate(130%);
          border-bottom: 1px solid rgba(255,255,255,0.03);
          height: 48px;
          box-sizing: border-box;
        }

        .site-brand {
          display: flex;
          align-items: center;
          gap: 8px;
          max-width: 45%;
        }

        .site-title {
          color: rgb(99, 99, 99);
          font-weight: 700;
          font-size: 1.2rem;
          line-height: 1.2;
          align-items: center;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .site-img {
          height: 32px;
          width: 32px;
          flex-shrink: 0;
        }

        .nav-scroll {
          display: flex;
          gap: 10px;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          scroll-behavior: smooth;
          padding: 4px 2px;
          align-items: center;
          max-width: 65%;
          height: 100%;
          scroll-snap-type: x mandatory;
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
        .nav-scroll::-webkit-scrollbar { display: none; }

        .header-link { text-decoration: none; }
        .header-btn {
          display: inline-block;
          white-space: nowrap;
          color: #333;
          padding: 6px 10px;
          border-radius: 8px;
          transition: background .12s, color .12s, transform .08s;
          font-size: 0.88rem;
          line-height: 1;
          scroll-snap-align: start;
        }

        .header-btn:hover,
        .header-btn:focus {
          background: rgba(0,0,0,0.06);
          color: #000;
          transform: translateY(-1px); /* 按钮悬浮上移 */
          outline: none;
        }

        .nav-scroll { cursor: grab; }
        .nav-scroll:active { cursor: grabbing; }

        /* 页脚样式 - 固定在底部 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #fffffffe;
            font-size: 0.8rem;
            /* 可选：加个上边框区分内容 */
            border-top: 1px solid rgba(0,0,0,0.1);
            /* 确保页脚不被内容遮挡 */
            z-index: 10;
            background: rgba(255, 255, 255, 0.031);
        }
    </style>
</head>
<body>
    <!-- 页面头部（导航栏） -->
    <header class="site-header">
      <div class="site-brand">
        <img class="site-img" src="/img/班徽.png">
        <span class="site-title">柳州铁一中学（初中部）- 2418班</span>
      </div>
      
      <nav class="header-buttons nav-scroll" aria-label="主导航" tabindex="0">
        <a href="/index.html" class="header-link"><span class="header-btn">主页</span></a>
        <!-- 激活当前页：班级荣誉 -->
        <a href="/honor.html" class="header-link"><span class="header-btn" style="background:rgb(99,99,99); color: white;">班级荣誉</span></a>
        <a href="/ty80y.html" class="header-link"><span class="header-btn">铁一80周年校庆专页</span></a>
      </nav>
    </header>

    <!-- 核心：新增内容容器，用于填充剩余空间 -->
    <div class="page-content">
        <!-- 主要内容容器 -->
        <div class="container">
            <!-- 荣誉分类标签 -->
            <div class="category-tabs">
                <button class="tab-btn active">全部荣誉</button>
            </div>

            <!-- 荣誉卡片展示区 -->
            <div class="honor-grid">
                <!-- 荣誉卡片1 -->
                <div class="honor-card">
                    <div class="honor-badge">校级一等奖</div>
                    <div class="card-img">
                        <img src="https://picsum.photos/seed/grade1/800/500" alt="运动会团体总分第一">
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">2025年春季校运动会初中二年级组团体总分第一名</h3>
                        <div class="card-meta">
                            <span>2025年4月28日</span>
                            <span>体育类集体荣誉</span>
                        </div>
                        <p class="card-desc">在2025年春季校运会上，我班同学奋勇拼搏，在短跑、跳远、跳高、接力赛等多个项目中取得优异成绩，最终以总分286分荣获全校初中二年级组团体第一名。</p>
                    </div>
                </div>
                <!-- 可继续添加更多卡片 -->
                <div class="honor-card">
                    <div class="honor-badge">市级二等奖</div>
                    <div class="card-img">
                        <img src="https://picsum.photos/seed/grade2/800/500" alt="科技创新大赛">
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">2025年柳州市青少年科技创新大赛团体二等奖</h3>
                        <div class="card-meta">
                            <span>2025年3月15日</span>
                            <span>科技类集体荣誉</span>
                        </div>
                        <p class="card-desc">我班团队提交的“AI校园垃圾分类助手”项目，在柳州市青少年科技创新大赛中表现优异，荣获初中组团体二等奖。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 - 现在会始终在底部 -->
    <footer class="footer">
        <p>豆包人工生成</p>
    </footer>

    <!-- 所有动态效果脚本 -->
    <script>
        // 1. 导航栏拖拽滚动 + 键盘控制
        (function(){
          const scroller = document.querySelector('.nav-scroll');
          if (!scroller) return;

          // 鼠标拖拽滑动
          let isDown = false;
          let startX, scrollLeft;

          // 鼠标按下
          scroller.addEventListener('mousedown', (e) => {
            isDown = true;
            scroller.classList.add('dragging');
            startX = e.pageX - scroller.offsetLeft;
            scrollLeft = scroller.scrollLeft;
            e.preventDefault(); // 防止默认选中文字
          });

          // 鼠标松开（全局监听，防止鼠标移出导航栏后无法松开）
          document.addEventListener('mouseup', () => {
            isDown = false;
            scroller.classList.remove('dragging');
          });

          // 鼠标移动
          document.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            const x = e.pageX - scroller.offsetLeft;
            const walk = (x - startX) * 1.1; // 1.1是滑动速度系数
            scroller.scrollLeft = scrollLeft - walk;
          });

          // 键盘左右键滚动
          scroller.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
              scroller.scrollBy({ left: 100, behavior: 'smooth' });
              e.preventDefault();
            }
            if (e.key === 'ArrowLeft') {
              scroller.scrollBy({ left: -100, behavior: 'smooth' });
              e.preventDefault();
            }
          });
        })();

        // 2. 分类标签切换动效
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除所有标签的active类
                tabBtns.forEach(b => b.classList.remove('active'));
                // 给当前点击的标签加active类（带动效）
                btn.classList.add('active');
                
                // 如果需要实现标签筛选逻辑，可在这里补充
                // 比如：根据标签筛选卡片显示/隐藏
            });
        });

        // 3. 可选：卡片点击轻微缩放动效（增强交互）
        const honorCards = document.querySelectorAll('.honor-card');
        honorCards.forEach(card => {
            card.addEventListener('click', () => {
                card.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    card.style.transform = 'translateY(-8px) scale(1)';
                }, 100);
            });
        });
    </script>
</body>
</html>
